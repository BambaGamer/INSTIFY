<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InStify</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.pinimg.com/1200x/a8/98/34/a89834b9eb73330380b26ab3cb612a8e.jpg">

    <!-- קישור לקובץ ה-CSS החיצוני -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 30px;">
<button id="themeToggle" class="theme-btn">
    <img src="/sun.png" alt="יום" class="theme-icon sun-icon">
    <img src="/moon.png" alt="לילה" class="theme-icon moon-icon">
</button>
    <div>
        <h1 style="margin: 0;">InStify</h1>
        <div class="count" id="count">0 שירים בפלייליסט</div>
    </div>
</header>

<div class="input-area">
    <input type="text" id="urlInput" placeholder="בחר שיר מהמכשיר שלך...">
    
    <button class="btn-go" id="fileBtn" onclick="document.getElementById('fileInput').click()">
        <img src="rocket.png" alt="הוסף" class="rocket-icon">
    </button>

    <input type="file" id="fileInput" accept="audio/*" style="display:none">
</div>

    <div id="loader" class="loader">מחלץ סאונד...</div>

    <div class="list" id="playlist"></div>

    <div class="player" id="player">
        <img src="" id="playerImg" class="player-img">
        <div class="player-title" id="playerTitle">מנגן כעת...</div>
        <button class="play-btn" id="mainPlayBtn">⏸️</button>
    </div>

    <!-- קישור לקובץ ה-JS החיצוני -->
    <script src="script.js"></script>
</body>
</html>
