<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InStify</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.pinimg.com/1200x/a8/98/34/a89834b9eb73330380b26ab3cb612a8e.jpg">

    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        
        header { margin-top: 30px; margin-bottom: 30px; text-align: right; }
        h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .count { color: var(--primary); font-weight: bold; font-size: 0.9rem; }

        .input-area { display: flex; flex-direction: row-reverse; gap: 10px; margin-bottom: 30px; }
        .input-box { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; color: white; font-size: 1rem; text-align: right; outline: none; }
        .btn-go { background: var(--primary); border: none; border-radius: 12px; width: 60px; height: 55px; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .btn-go:active { transform: scale(0.9); }

        .list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        .song-card { background: var(--card); padding: 12px; border-radius: 16px; display: flex; flex-direction: row-reverse; align-items: center; gap: 15px; transition: 0.3s; }
        .song-card:active { background: #222; }
        .thumb { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; background: #333; }
        .info { flex: 1; text-align: right; }
        .info p { margin: 0; font-weight: bold; }
        .btn-delete { background: none; border: none; color: #444; font-size: 1.2rem; cursor: pointer; }

        .player { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--primary); border-radius: 20px; padding: 12px 20px; display: none; flex-direction: row-reverse; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-img { width: 45px; height: 45px; border-radius: 8px; margin-left: 15px; }
        .player-title { flex: 1; color: white; font-weight: bold; text-align: right; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .play-btn { background: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .loader { display: none; text-align: center; color: var(--primary); margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>InStify</h1>
        <div class="count" id="count">0 שירים בפלייליסט</div>
    </header>

    <div class="input-area">
        <input type="text" id="urlInput" class="input-box" placeholder="הדבק לינק של ריל כאן..." dir="ltr">
        <button class="btn-go" id="extractBtn">🚀</button>
    </div>

    <div id="loader" class="loader">מחלץ סאונד...</div>

    <div class="list" id="playlist"></div>

    <div class="player" id="player">
        <img src="" id="playerImg" class="player-img">
        <div class="player-title" id="playerTitle">מנגן כעת...</div>
        <button class="play-btn" id="mainPlayBtn">⏸️</button>
    </div>

    <script>
        let songs = JSON.parse(localStorage.getItem('instify_data')) || [];
        const audio = new Audio();
        let isPlaying = false;

        function save() {
            localStorage.setItem('instify_data', JSON.stringify(songs));
            render();
        }

        async function extract() {
            const url = document.getElementById('urlInput').value;
            if (!url.includes('instagram.com')) return alert('אחי, שים לינק תקין של אינסטגרם');

            document.getElementById('loader').style.display = 'block';
            
            try {
                // API שעוקף את החסימה של אינסטגרם
                const res = await fetch(`https://social-download-api.vercel.app/api/instagram?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if (data.links) {
                    const mp3 = data.links.find(l => l.type === 'mp3' || l.type === 'audio')?.url || data.links[0].url;
                    const newSong = {
                        id: Date.now(),
                        title: `Song ${songs.length + 1}`,
                        url: mp3,
                        image: data.thumbnail || 'https://via.placeholder.com/150'
                    };
                    songs.unshift(newSong);
                    document.getElementById('urlInput').value = '';
                    save();
                }
            } catch (e) {
                alert('שגיאה בחילוץ. נסה שוב מאוחר יותר.');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function render() {
            const list = document.getElementById('playlist');
            const count = document.getElementById('count');
            list.innerHTML = '';
            count.innerText = `${songs.length} שירים בפלייליסט`;

            songs.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <img src="${song.image}" class="thumb">
                    <div class="info">
                        <p>${song.title}</p>
                    </div>
                    <button class="btn-delete" onclick="deleteSong(event, ${index})">🗑️</button>
                `;
                card.onclick = () => play(song);
                list.appendChild(card);
            });
        }

        function play(song) {
            if (audio.src === song.url) {
                if (isPlaying) { audio.pause(); isPlaying = false; }
                else { audio.play(); isPlaying = true; }
            } else {
                audio.src = song.url;
                audio.play();
                isPlaying = true;
                document.getElementById('player').style.display = 'flex';
                document.getElementById('playerTitle').innerText = song.title;
                document.getElementById('playerImg').src = song.image;
            }
            updateBtn();
        }

        function updateBtn() {
            document.getElementById('mainPlayBtn').innerText = isPlaying ? '⏸️' : '▶️';
        }

        function deleteSong(e, index) {
            e.stopPropagation();
            songs.splice(index, 1);
            save();
        }

        document.getElementById('extractBtn').onclick = extract;
        document.getElementById('mainPlayBtn').onclick = () => {
            if (isPlaying) { audio.pause(); isPlaying = false; }
            else { audio.play(); isPlaying = true; }
            updateBtn();
        };

        render();
    </script>
</body>
</html>
