<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>InStify Unlimited</title>
    <style>
        :root { --purple: #a45df6; --bg: #000; --card: #121212; }
        html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: #fff; }
        
        #home-screen { height: 100%; overflow-y: auto; padding: calc(60px + env(safe-area-inset-top)) 20px 120px; box-sizing: border-box; }
        h1 { font-size: 38px; margin-bottom: 20px; font-weight: 900; }

        .search-area { background: var(--card); padding: 10px; border-radius: 16px; display: flex; gap: 10px; border: 1px solid #282828; margin-bottom: 30px; }
        .search-area input { flex: 1; background: none; border: none; color: white; font-size: 16px; outline: none; text-align: right; }
        
        .convert-btn { background: var(--purple); border: none; color: white; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .song-item { background: var(--card); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .song-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #222; }
        .song-info { flex: 1; overflow: hidden; }
        .song-info h4 { margin: 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #full-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1e1135, #000); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 60px 20px 40px; box-sizing: border-box; transform: translateY(100%); transition: 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        #full-player.active { display: flex; transform: translateY(0); }
        .album-art { width: 80vw; height: 80vw; max-width: 320px; border-radius: 20px; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .play-btn { width: 80px; height: 80px; background: white; border-radius: 50%; border: none; font-size: 35px; color: black; display: flex; align-items: center; justify-content: center; }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 3px solid #333; border-top: 3px solid var(--purple); border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>InStify</h1>
        <div class="search-area">
            <button class="convert-btn" onclick="fetchAudio()">המרה</button>
            <input type="text" id="reel-url" placeholder="הדבק לינק מאינסטגרם...">
        </div>
        <div id="playlist"></div>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">שואב מוזיקה (ללא הגבלה)...</p>
    </div>

    <div id="full-player">
        <div style="width:40px; height:5px; background:rgba(255,255,255,0.2); border-radius:10px;" onclick="closePlayer()"></div>
        <img id="p-img" class="album-art" src="icon.png">
        <h2 id="p-title" style="margin:0; text-align:center;">שם השיר</h2>
        <button class="play-btn" id="mainPlayBtn">▶</button>
        <audio id="main-audio" crossorigin="anonymous"></audio>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('mainPlayBtn');
        const playlistContainer = document.getElementById('playlist');
        let mySongs = JSON.parse(localStorage.getItem('unlimited_reels')) || [];

        function render() {
            playlistContainer.innerHTML = '';
            mySongs.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = 'song-item';
                item.innerHTML = `
                    <img src="${song.img}" class="song-img" onclick="playSong(${i})">
                    <div class="song-info" onclick="playSong(${i})">
                        <h4>${song.title}</h4>
                        <p style="color:#666; font-size:12px">מוכן לנגינה</p>
                    </div>
                    <div onclick="deleteSong(${i})" style="color:#444">✕</div>
                `;
                playlistContainer.appendChild(item);
            });
            localStorage.setItem('unlimited_reels', JSON.stringify(mySongs));
        }

        async function fetchAudio() {
            const url = document.getElementById('reel-url').value;
            if (!url.includes('instagram.com')) return alert('לינק לא תקין');
            document.getElementById('loader').style.display = 'flex';

            try {
                // מנוע חלופי חזק יותר שלא מוגבל על ידי InStify
                const response = await fetch(`https://api.vkrtool.com/api/instagram?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data && data.data && data.data.audio) {
                    const name = prompt("תן שם לשיר:", data.data.title || "שיר חדש");
                    if (name) {
                        mySongs.unshift({
                            title: name,
                            url: data.data.audio,
                            img: data.data.thumbnail || 'icon.png'
                        });
                        render();
                    }
                } else {
                    alert("המנוע עמוס, נסה שוב בעוד כמה שניות");
                }
            } catch (e) {
                alert("שגיאה בחילוץ. וודא שהחשבון באינסטגרם לא פרטי.");
            } finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('reel-url').value = '';
            }
        }

        function playSong(i) {
            const s = mySongs[i];
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-img').src = s.img;
            audio.src = s.url;
            document.getElementById('full-player').classList.add('active');
            audio.play();
            playBtn.innerText = '⏸';
        }

        function closePlayer() { document.getElementById('full-player').classList.remove('active'); audio.pause(); }
        function deleteSong(i) { mySongs.splice(i, 1); render(); }

        playBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
            else { audio.pause(); playBtn.innerText = '▶'; }
        });

        render();
    </script>
</body>
</html>
